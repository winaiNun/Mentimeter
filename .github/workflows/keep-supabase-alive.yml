name: Keep Supabase Alive

on:
  schedule:
    # Every 3 days at 00:00 UTC — comfortably under Supabase's
    # ~7-day free-tier inactivity pause window
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -sf "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -o /dev/null
