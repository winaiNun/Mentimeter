name: Keep Supabase Alive

on:
  schedule:
    # Every 3 days at 00:00 UTC — comfortably under Supabase's
    # ~7-day free-tier inactivity pause window
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          status=$(curl -s -o /tmp/body -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/presentations?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}")
          echo "HTTP status: $status"
          cat /tmp/body
          if [ "$status" -ge 400 ]; then
            exit 1
          fi
